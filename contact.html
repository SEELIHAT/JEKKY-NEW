<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма обратной связи</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        form { max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        input, button { padding: 10px; font-size: 16px; }
        button { background-color: #007BFF; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h2>Оставьте ваши данные</h2>
<form action="http://localhost/test-mail/send.php" method="POST">

        <label>Ваше имя:
            <input type="text" name="username" required placeholder="Иван">
        </label>
        <label>Ваш Email:
            <input type="email" name="useremail" required placeholder="example@mail.com">
        </label>
        <button type="submit">Отправить заявку</button>
    </form>
</body>
</html>
